name: Sync Upstream KernelSU

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout XinovaSU
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/tiann/KernelSU.git || true
          git fetch upstream --tags

      - name: Get latest upstream tag
        id: upstream_tag
        run: |
          LATEST=$(git ls-remote --tags upstream \
            | awk '{print $2}' \
            | grep -v '{}' \
            | sed 's|refs/tags/||' \
            | grep -v "^v0\." \
            | sort -V | tail -1)
          echo "tag=${LATEST}" >> $GITHUB_OUTPUT
          echo "Latest upstream tag: ${LATEST}"

      - name: Check if already synced
        id: check_sync
        run: |
          TAG="${{ steps.upstream_tag.outputs.tag }}"
          BRANCH="upstream-sync-${TAG}"
          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            echo "already_synced=true" >> $GITHUB_OUTPUT
            echo "Branch ${BRANCH} already exists, skipping."
          else
            echo "already_synced=false" >> $GITHUB_OUTPUT
            echo "New tag ${TAG} detected, will create PR."
          fi

      - name: Create sync branch and PR
        if: steps.check_sync.outputs.already_synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream_tag.outputs.tag }}"
          BRANCH="upstream-sync-${TAG}"
          # create branch from upstream tag (tags are local after fetch --tags)
          git checkout -b "${BRANCH}" "refs/tags/${TAG}"
          # configure push URL with token
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # push branch
          git push origin "${BRANCH}"
          # create PR body
          printf '%s\n\n## Notes\n- Upstream: %s\n- Source: https://github.com/tiann/KernelSU/releases/tag/%s\n\nAfter merge, check T2/T3 identity replacements if upstream added new kernelsu files.\n' \
            "Automated sync from tiann/KernelSU ${TAG}" \
            "${TAG}" "${TAG}" > /tmp/pr_body.txt
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: sync upstream KernelSU ${TAG}" \
            --body "$(cat /tmp/pr_body.txt)" \
            --label "upstream-sync" || echo "PR creation failed, branch pushed."