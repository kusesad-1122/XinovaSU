name: Build ksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      pack_lkm:
        required: false
        type: boolean
        default: false
      pack_xnsuinit:
        required: false
        type: boolean
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v8
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        find . -name "*_xinovasu.ko" -type f | \
          xargs -I{} cp {} ./userspace/ksud/bin/aarch64/

    - name: Prepare xnsuinit (debug)
      if: ${{ inputs.pack_xnsuinit }}
      run: |
        echo "=== DEBUG: find xnsuinit ==="
        find . -name xnsuinit -type f 2>/dev/null || echo "(none)"
        echo "---"
        SRC=$(find . -name xnsuinit -type f | head -1)
        if [ -n "$SRC" ]; then
          echo "FOUND: $SRC ($(wc -c < "$SRC") bytes)"
          # Use .bin extension to avoid RustEmbed include-flate filtering bug
          cp "$SRC" ./userspace/ksud/bin/aarch64/xnsuinit.bin
          ls -la ./userspace/ksud/bin/aarch64/xnsuinit.bin
        else
          echo "WARNING: xnsuinit NOT FOUND"
          echo "dirs:"; ls -d */
        fi
        echo "=== END DEBUG ==="
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add ${{ inputs.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/ksud
        cache-targets: false

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r29

    - name: Build ksud
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        echo "=== BEFORE BUILD: bin/aarch64/ contents ==="
        ls -la ./userspace/ksud/bin/aarch64/
        echo "=== END ==="
        source .github/scripts/setup-rust-build.sh ${{ inputs.target }} 26
        echo "=== RUSTEMBED TEST ==="
        ls -la ./userspace/ksud/bin/aarch64/xnsuinit 2>/dev/null && echo "xnsuinit EXISTS at build time" || echo "xnsuinit MISSING at build time"
        # Force re-run of RustEmbed proc-macro by touching assets.rs
        # Cargo incremental compilation may skip re-running the proc-macro
        # when only the embedded files change but the source doesn't.
        touch userspace/ksud/src/assets.rs
        cargo build --target $TRIPLE --release --manifest-path ./userspace/ksud/Cargo.toml

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksud-${{ inputs.target }}
        path: target/${{ inputs.target }}/release/xnsusd
