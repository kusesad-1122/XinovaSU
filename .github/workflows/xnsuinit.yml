name: Build xnsuinit
on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
        default: ubuntu-latest
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add aarch64-unknown-linux-musl

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: . -> target
        cache-targets: false

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27

    - name: Build xnsuinit
      run: |
        LLVM_BIN=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$LLVM_BIN/aarch64-linux-android26-clang"
        export RUSTFLAGS="-C link-arg=-no-pie"
        cargo build --package xnsuinit --target=aarch64-unknown-linux-musl --release

    - name: Upload xnsuinit artifact
      uses: actions/upload-artifact@v7
      with:
        name: xnsuinit
        path: target/**/release/xnsuinit
