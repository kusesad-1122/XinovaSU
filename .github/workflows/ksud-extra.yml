name: Build ksud with cross
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: false
      pack_xnsuinit:
        required: false
        type: boolean
        default: false
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v8
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        find . -name "*_xinovasu.ko" -type f | \
          xargs -I{} cp {} ./userspace/ksud/bin/aarch64/

    - name: Prepare xnsuinit
      if: ${{ inputs.pack_xnsuinit }}
      run: |
        find . -name xnsuinit -type f | head -1 | \
          xargs -I{} cp {} ./userspace/ksud/bin/aarch64/xnsuinit.bin
        
    - name: Setup rustup
      run: |
        rustup update stable
        if [[ ${{ inputs.target }} == *"-apple-darwin" ]]; then
          rustup target add ${{ inputs.target }}
        fi
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/ksud
        cache-targets: false
        cache-bin: false

    - name: Install cross
      run: |
        RUSTFLAGS="" cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1

    - name: Build ksud
      run: |
        touch userspace/ksud/src/assets.rs
        CROSS_NO_WARNINGS=0 cross build --target ${{ inputs.target }} --release --manifest-path ./userspace/ksud/Cargo.toml

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksud-${{ inputs.target }}
        path: target/${{ inputs.target }}/release/xnsusd*
